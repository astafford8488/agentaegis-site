<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Received · AgentAegis</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/demo.css" />
  <style>
    .ok-shell { max-width: 560px; margin: 0 auto; padding: 96px 24px; text-align: center; }
    .ok-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(0, 212, 168, 0.15); border: 1px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .ok-icon svg { width: 28px; height: 28px; color: var(--accent); }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 12px; }
    .ok-sub { color: var(--text-muted); font-size: 16px; margin-bottom: 32px; }
    .balance-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px;
      text-align: left; margin-bottom: 24px;
    }
    .balance-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .balance-row:last-child { border: none; padding-bottom: 0; }
    .balance-row .label { color: var(--text-muted); font-size: 13px; }
    .balance-row .value { color: var(--text); font-weight: 600; font-family: 'JetBrains Mono', monospace; font-size: 14px; }
    .loading { color: var(--text-dim); font-size: 13px; }
  </style>
</head>
<body>

<header class="demo-header">
  <div class="container demo-nav">
    <a href="/" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2 L4 6 L4 12 C4 17 8 21 12 22 C16 21 20 17 20 12 L20 6 Z"/>
        <path d="M9 12 L11 14 L15 10"/>
      </svg>
      AgentAegis
    </a>
  </div>
</header>

<main class="ok-shell">
  <div class="ok-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>Payment received.</h1>
  <p class="ok-sub">Your AgentAegis balance is being credited. This can take a few seconds while Stripe confirms.</p>

  <div class="balance-card" id="balance-card">
    <div class="loading">Checking balance...</div>
  </div>

  <p class="loading"><a href="/" style="color: var(--text-muted);">← Back home</a></p>
</main>

<script>
  const API_BASE = "https://agentaegis-mcp-production.up.railway.app";
  const params = new URLSearchParams(location.search);
  const customerId = params.get("customer");
  const card = document.getElementById("balance-card");

  async function checkBalance() {
    if (!customerId) {
      card.innerHTML = '<div class="loading">No customer ID in URL — cannot check balance automatically.</div>';
      return;
    }

    // We can't authenticate without an API key, so we'll show a polite message
    // and rely on the customer to log in or check via their own tooling.
    card.innerHTML = `
      <div class="balance-row">
        <span class="label">Customer ID</span>
        <span class="value">${customerId.slice(0, 8)}...</span>
      </div>
      <div class="balance-row">
        <span class="label">Status</span>
        <span class="value" style="color: var(--accent);">Webhook delivery in progress</span>
      </div>
      <div class="balance-row">
        <span class="label">Where to verify</span>
        <span class="value" style="font-size: 12px;">GET /v1/customers/${customerId.slice(0, 8)}.../balance</span>
      </div>
    `;
  }

  checkBalance();
</script>
</body>
</html>
